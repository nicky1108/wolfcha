name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: "postgres://wolfcha:ci-postgres-password@127.0.0.1:5432/wolfcha"
      AUTH_SECRET: "ci-auth-secret-for-build-only"
      TOKENDANCE_API_KEY: "ci-tokendance-key"
      TOKENDANCE_BASE_URL: "http://127.0.0.1:8080"
      MINIMAX_API_KEY: "ci-minimax-key"
      MINIMAX_GROUP_ID: "ci-minimax-group"
      ZPAYZ_PID: "ci-zpayz-pid"
      ZPAYZ_KEY: "ci-zpayz-key"
      ADMIN_EMAILS: "ci@example.com"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Build
        run: pnpm build

  deploy-vercel:
    name: Deploy to Vercel
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        run: pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt output
        run: pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-vps:
    name: Deploy to VPS
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      PRODUCTION_ENV_B64: ${{ secrets.PRODUCTION_ENV_B64 }}
      APP_DIR: /opt/wolfcha
      DOMAIN: wolfcha.openhubs.xyz
      REPO_URL: https://github.com/${{ github.repository }}.git
      SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -o ConnectTimeout=60
      GHCR_USERNAME: ${{ github.repository_owner }}
      GHCR_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_PASSWORD"
          test -n "$PRODUCTION_ENV_B64"

      - name: Decode production environment for image build
        run: |
          printf '%s' "$PRODUCTION_ENV_B64" | base64 -d > .env.production
          while IFS='=' read -r key value; do
            case "$key" in
              NEXT_PUBLIC_APP_URL|NEXT_PUBLIC_WATCHA_CLIENT_ID|NEXT_PUBLIC_SHOW_DEVTOOLS)
                value="${value%$'\r'}"
                printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                ;;
            esac
          done < .env.production

      - name: Set image metadata
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            printf 'IMAGE_REF=%s:%s\n' "$IMAGE_REPO" "$GITHUB_SHA"
            printf 'IMAGE_LATEST=%s:latest\n' "$IMAGE_REPO"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_LATEST }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            NPM_REGISTRY=https://registry.npmmirror.com
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_WATCHA_CLIENT_ID=${{ env.NEXT_PUBLIC_WATCHA_CLIENT_ID }}
            NEXT_PUBLIC_SHOW_DEVTOOLS=${{ env.NEXT_PUBLIC_SHOW_DEVTOOLS }}

      - name: Install SSH client helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare server checkout
        run: |
          TARGET="${VPS_USER}@${VPS_HOST}"
          for attempt in $(seq 1 10); do
            if sshpass -p "$VPS_PASSWORD" ssh $SSH_OPTS "$TARGET" \
              "APP_DIR='$APP_DIR' REPO_URL='$REPO_URL' GITHUB_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail
          if ! command -v git >/dev/null 2>&1; then
            apt-get update
            apt-get install -y git
          fi

          if [ -d "$APP_DIR/.git" ]; then
            cd "$APP_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch --prune origin
          else
            rm -rf "$APP_DIR"
            git clone "$REPO_URL" "$APP_DIR"
            cd "$APP_DIR"
          fi

          git fetch origin "$GITHUB_SHA"
          git checkout --force "$GITHUB_SHA"
          git reset --hard "$GITHUB_SHA"
          REMOTE
            then
              exit 0
            fi

            echo "SSH prepare failed (attempt ${attempt}/10); retrying."
            sleep 20
          done

          exit 1

      - name: Upload production environment
        run: |
          TARGET="${VPS_USER}@${VPS_HOST}"
          cp .env.production .env.production.deploy
          printf '\nWOLFCHA_IMAGE=%s\n' "$IMAGE_REF" >> .env.production.deploy
          for attempt in $(seq 1 10); do
            if sshpass -p "$VPS_PASSWORD" scp $SSH_OPTS .env.production.deploy "$TARGET:$APP_DIR/.env.production" &&
              sshpass -p "$VPS_PASSWORD" ssh $SSH_OPTS "$TARGET" "chmod 600 '$APP_DIR/.env.production'"
            then
              exit 0
            fi

            echo "SSH env upload failed (attempt ${attempt}/10); retrying."
            sleep 20
          done

          exit 1

      - name: Start VPS deploy
        run: |
          TARGET="${VPS_USER}@${VPS_HOST}"
          for attempt in $(seq 1 10); do
            if sshpass -p "$VPS_PASSWORD" ssh $SSH_OPTS "$TARGET" \
              "APP_DIR='$APP_DIR' DOMAIN='$DOMAIN' WOLFCHA_IMAGE='$IMAGE_REF' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" <<'REMOTE'
          set -euo pipefail
          LOG_FILE=/tmp/wolfcha-deploy.log
          EXIT_FILE=/tmp/wolfcha-deploy.exit
          rm -f "$LOG_FILE" "$EXIT_FILE"
          export APP_DIR DOMAIN WOLFCHA_IMAGE GHCR_USERNAME GHCR_TOKEN LOG_FILE EXIT_FILE
          nohup bash -lc 'cd "$APP_DIR" && bash scripts/deploy-vps.sh; status=$?; printf "%s\n" "$status" > "$EXIT_FILE"; exit "$status"' > "$LOG_FILE" 2>&1 &
          echo "VPS deploy started in background"
          REMOTE
            then
              exit 0
            fi

            echo "SSH deploy start failed (attempt ${attempt}/10); retrying."
            sleep 20
          done

          exit 1

      - name: Wait for VPS deploy
        run: |
          TARGET="${VPS_USER}@${VPS_HOST}"
          for attempt in $(seq 1 90); do
            set +e
            output="$(sshpass -p "$VPS_PASSWORD" ssh $SSH_OPTS "$TARGET" 'bash -s' <<'REMOTE'
          LOG_FILE=/tmp/wolfcha-deploy.log
          EXIT_FILE=/tmp/wolfcha-deploy.exit
          if [ -f "$LOG_FILE" ]; then
            tail -n 60 "$LOG_FILE"
          else
            echo "Deploy log not created yet."
          fi
          if [ -f "$EXIT_FILE" ]; then
            exit "$(cat "$EXIT_FILE")"
          fi
          exit 86
          REMOTE
          )"
            status=$?
            set -e
            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -eq 86 ] || [ "$status" -eq 255 ]; then
              echo "Deploy still running or SSH poll failed transiently (attempt ${attempt}/90)."
              sleep 20
              continue
            fi

            exit "$status"
          done

          echo "Timed out waiting for VPS deploy."
          exit 1

      - name: Verify public endpoint
        run: curl -fsS --retry 5 --retry-delay 5 "https://${DOMAIN}/api/health"
